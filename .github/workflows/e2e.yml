name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Seed Excel test data
        run: npm run seed

      - name: Run API tests
        run: npm run test:api
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://www.codeslaps.com' }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Upload Excel results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results-${{ github.run_number }}
          path: reports/test-results.xlsx

  ui-tests:
    name: UI Tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Seed Excel test data
        run: npm run seed

      - name: Run UI tests (${{ matrix.project }})
        run: npx playwright test --project=${{ matrix.project }}
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://www.codeslaps.com' }}
          HEADLESS: 'true'
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}-${{ github.run_number }}
          path: reports/playwright-html/

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.project }}-${{ github.run_number }}
          path: reports/screenshots/
